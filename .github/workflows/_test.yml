on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Unit tests (widget logic + make-switcher parity)
        run: npm test
      # release.yml downloads every artifact in the run and attaches them, so name this
      # explicitly (not the default "artifact") and fail loudly if the plugin is missing
      # — it's a release asset.
      - name: Upload version switcher artifact
        uses: actions/upload-artifact@v7
        with:
          name: version-switcher
          path: plugins/version-switcher.mjs
          if-no-files-found: error
