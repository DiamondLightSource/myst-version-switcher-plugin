on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Unit tests (widget logic + make-switcher parity)
        run: npm test
      - name: Upload version switcher artifact
        uses: actions/upload-artifact@v7
        with:
          path: plugins/version-switcher.mjs
