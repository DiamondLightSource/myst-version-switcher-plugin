name: CI

# Verify + build, then publish on INTERNAL events. Runs on every PR (including
# forks), pushes to main, and tags — lint, test, build the docs, and on tags
# publish the release assets. It uploads each build's `docs` artifact.
#
# Publishing is nested here (the `publish` job → publish-dispatch.yml → publish.yml)
# so its status is visible on the PR / commit, but ONLY for internal NON-TAG events: a
# fork PR's build runs with a read-only token and must never deploy, so the `publish`
# job is skipped for it (the `docs` reusable workflow points a maintainer at the manual
# opt-in instead). TAGS deploy via the `publish-tag` trampoline (which dispatches
# publish-dispatch.yml) instead of inline — a same-SHA tag deploy would otherwise be
# silently dropped by Pages. See the architecture explanation in docs/.
on:
  pull_request:
  push:
    branches: [main]
    tags: ['*']            # '*' never matches '/', so e.g. release/x tags don't build

jobs:
  lint:
    uses: ./.github/workflows/_lint.yml

  test:
    uses: ./.github/workflows/_test.yml

  docs:
    uses: ./.github/workflows/docs.yml
    with:
      # This repo is a Node project: install deps then build with myst. docs.yml
      # installs uv too, but it's unused here (the unconditional-uv baseline).
      build-command: npm ci && npm run docs

  release:
    needs: [lint, test, docs]
    if: github.ref_type == 'tag'
    uses: ./.github/workflows/_release.yml
    permissions:
      contents: write    # create the GitHub Release + attach assets

  # Internal NON-TAG events (an internal PR or a push to main): a same-repo build we
  # can trust + deploy inline, with the publish status visible on the PR/commit. These
  # are the FIRST deploy of their SHA, so the Pages backend serves them fine. We call
  # the publish-dispatch.yml wrapper (its workflow_call path), which nests publish.yml
  # to reconstruct the whole site and inject this build's `docs` artifact for
  # `docs.version-name`. Fork PRs (head repo ≠ this repo) are excluded — docs.yml's
  # build job warns them instead. TAGS are excluded too: see publish-tag below.
  publish:
    needs: [lint, test, docs]
    if: >-
      github.repository == 'DiamondLightSource/myst-version-switcher-plugin' &&
      github.ref_type != 'tag' &&
      ( github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository )
    uses: ./.github/workflows/publish-dispatch.yml
    with:
      version-name: ${{ needs.docs.outputs.version-name }}
    permissions:
      contents: read
      actions: read
      pages: write
      id-token: write
      statuses: write

  # Tags can't deploy inline. A release tag is cut on the merge commit, so it shares
  # the default branch's just-deployed SHA — and the Pages backend silently DROPS a
  # second same-SHA deploy on a non-`workflow_dispatch` event (reports success, keeps
  # serving the old artifact; see publish.yml). The escape hatch is that a
  # `workflow_dispatch` deploy of that SHA forces a re-serve. So instead of nesting the
  # deploy inline, re-trigger publish-dispatch.yml as a workflow_dispatch (after
  # `release`, so the dispatched run gathers the new release's docs.zip). The dispatched
  # run does the deploy + verify; its status shows on its own run rather than this tag's
  # CI, which is fine — a tag has no PR to annotate. (Consumers do the same by
  # dispatching their own publish-dispatch.yml — see the how-to.)
  publish-tag:
    needs: [lint, test, docs, release]
    if: >-
      github.repository == 'DiamondLightSource/myst-version-switcher-plugin' &&
      github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      actions: write     # dispatch publish-dispatch.yml
    steps:
      - name: Re-deploy via workflow_dispatch (tag trampoline)
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          gh workflow run publish-dispatch.yml --repo "$GITHUB_REPOSITORY" --ref "$DEFAULT_BRANCH"
