name: Docs

on:
  workflow_call:
    inputs:
      build-command:
        description: Command that builds the HTML site into html-dir at $BASE_URL.
        required: false
        default: make docs
        type: string
      html-dir:
        description: Directory the build writes the site to (packed as docs.zip's html/).
        required: false
        default: docs/_build/html
        type: string
    outputs:
      version-name:
        description: The version name this build was served at (pr-<n> | <default-branch> | <tag>).
        value: ${{ jobs.build.outputs.version-name }}

# REUSABLE docs build — the UNPRIVILEGED half, shared across MyST projects. Builds
# the docs at the versioned BASE_URL and uploads this build's `docs` artifact
# (docs.zip, bare html/ root). It runs for every event — PRs (including forks),
# pushes to the default branch, and tags — but NEVER publishes. publish.yml (the
# privileged half) deploys, called separately by the consumer's ci.yml on internal
# events, injecting THIS build's artifact for the current version name.
#
# This workflow OWNS the build/publish contract so it cannot drift: the version
# name, the BASE_URL, the docs.zip bare-html/ root, and the `docs` artifact name all
# live here. The consumer supplies only HOW to turn sources into HTML, via
# `build-command`.
#
# Environment given to build-command: Node/npx (preinstalled on the runner) and uv
# (always installed; honours a committed .python-version). So build-command can be
# `make docs`, `npx … myst build`, `tox -e docs`, `uv run …`, etc. Fold any
# project-specific setup (cp CONFIG, npm ci, apt deps) behind that one command.
#
# contents:read at the workflow level keeps this (untrusted-input) build incapable
# of holding a write token — the elevated permissions live only in publish.yml.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version-name: ${{ steps.ver.outputs.version-name }}
    steps:
      - uses: actions/checkout@v7

      # uv is installed unconditionally (Node/npx is already on the runner) so every
      # docs build has the same baseline env regardless of build-command. With no
      # python-version input it only puts uv on PATH, honouring a committed
      # .python-version if the project has one — a no-op for npx-only repos.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      # Version name = the site sub-dir this build is served at, and the BASE_URL it
      # must be built with. pr-<n> for PRs; otherwise the ref name (default branch or
      # a tag without `/`). No sanitisation: every version name is URL/path-safe.
      - name: Compute version name
        id: ver
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = pull_request ]; then
            name="pr-${{ github.event.pull_request.number }}"
          else
            name="${{ github.ref_name }}"
          fi
          echo "version-name=$name" >> "$GITHUB_OUTPUT"

      # BASE_URL must match the versioned sub-path the build is served at, or its
      # root-absolute assets 404. assemble files this build's artifact at the same
      # version name (site/<default-branch>, site/<tag>, site/pr-<n>), so the two
      # cannot drift. build-command comes through an env var (not interpolated into
      # the script) and is run with `eval` so compound commands work.
      - name: Build docs
        env:
          BASE_URL: /${{ github.event.repository.name }}/${{ steps.ver.outputs.version-name }}
          BUILD_COMMAND: ${{ inputs.build-command }}
        run: |
          set -euo pipefail
          eval "$BUILD_COMMAND"

      # Pack the site as docs.zip with a bare html/ root — the durable contract both
      # publish.yml's gather and _release.yml's asset rely on. Stage into html/
      # first so any html-dir name yields the same root.
      - name: Pack docs.zip (bare html/ root)
        env:
          HTML_DIR: ${{ inputs.html-dir }}
        run: |
          set -euo pipefail
          staging="$RUNNER_TEMP/pack"
          rm -rf "$staging"
          mkdir -p "$staging/html"
          cp -a "$HTML_DIR/." "$staging/html/"
          ( cd "$staging" && zip -rq "$RUNNER_TEMP/docs.zip" html )

      # compression-level 0: docs.zip is already compressed.
      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs
          path: ${{ runner.temp }}/docs.zip
          compression-level: 0

      # NOTE: the fork-PR "preview not published" hint now lives in publish-dispatch.yml
      # (its `warn` job), which runs for fork PRs too — so this build job stays purely
      # about building + uploading the docs artifact.
