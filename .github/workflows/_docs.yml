on:
  workflow_call:

# Mirrors python-copier-template-example .github/workflows/_docs.yml, adapted for a
# MyST/JS project: this repo has no uv/tox, so docs are built with mystmd via npm
# rather than `uv run tox -e docs`, and switcher.json is written by this repo's own
# `switcher` composite action instead of `make_switcher.py`.
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Avoid git conflicts when tag and branch pushed at same time
        if: github.ref_type == 'tag'
        run: sleep 60

      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Need tags (for the switcher version list) and origin/gh-pages.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install MyST
        run: npm install -g mystmd@1.10.1

      - name: Sanitize ref name for docs version
        run: echo "DOCS_VERSION=${GITHUB_REF_NAME//[^A-Za-z0-9._-]/_}" >> $GITHUB_ENV

      # BASE_URL is required so assets/links resolve under the versioned Pages
      # sub-path (https://<org>.github.io/<repo>/$DOCS_VERSION/).
      - name: Build docs
        env:
          BASE_URL: /${{ github.event.repository.name }}/${{ env.DOCS_VERSION }}
        run: |
          cd docs
          myst build --html

      - name: Remove build cache from artifact
        run: rm -rf docs/_build/templates

      - name: Upload built docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs/_build

      - name: Move to versioned directory
        run: mv docs/_build/html .github/pages/$DOCS_VERSION

      - name: Write switcher.json
        uses: ./switcher
        with:
          version: ${{ env.DOCS_VERSION }}
          repo: ${{ github.repository }}

      - name: Publish Docs to gh-pages
        if: github.ref_type == 'tag' || github.ref_name == 'main'
        # We pin to the SHA, not the tag, for security reasons.
        # https://docs.github.com/en/actions/learn-github-actions/security-hardening-for-github-actions#using-third-party-actions
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .github/pages
          keep_files: true
