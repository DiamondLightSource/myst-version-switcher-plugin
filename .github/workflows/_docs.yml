on:
  workflow_call:

# Reconstruct the whole versioned site from durable sources and publish it
# directly to GitHub Pages (no gh-pages branch). See DESIGN.md.
#
# Split into build + deploy: only the deploy job enters the `github-pages`
# environment, so PR build-checks (which never deploy) aren't gated by the
# environment's deployment-branch protection. Requires the repo's Pages source
# set to "GitHub Actions" (Settings → Pages).

# Publish on: any tag, the default branch, or any push to a FORK (whose own
# Pages serves the contributor's preview — see DESIGN "External-PR previews").
# A base-repo PR only build-checks; nothing is published.
env:
  UPSTREAM: DiamondLightSource/myst-version-switcher-plugin

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout + read release assets
      actions: read     # download other runs' docs artifacts (cross-run)
    steps:
      - name: Avoid git conflicts when tag and branch pushed at same time
        if: github.ref_type == 'tag'
        run: sleep 60

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # tags, for version ordering + prerelease detection

      - name: Install dependencies
        run: npm ci

      - name: Sanitise the current ref to a docs version
        id: ver
        uses: ./current-version
        with:
          ref-name: ${{ github.ref_name }}

      # BASE_URL must match the versioned sub-path the build is served at, or its
      # root-absolute assets 404. Same token the assemble action names site/<v>.
      - name: Build docs
        env:
          BASE_URL: /${{ github.event.repository.name }}/${{ steps.ver.outputs.version }}
        run: npm run docs

      # Gather every version + this build, write switcher.json + redirect, upload
      # this build's `docs` artifact, and emit the assembled site dir. On a fork,
      # required-branches is the current ref (so its own preview always satisfies
      # the guard); upstream guards `main`.
      - name: Assemble versioned site
        id: site
        if: github.ref_type == 'tag' || github.ref_name == 'main' || github.repository != env.UPSTREAM
        uses: ./assemble
        with:
          html-dir: docs/_build/html
          ref-name: ${{ github.ref_name }}
          required-branches: ${{ github.repository == env.UPSTREAM && 'main' || github.ref_name }}

      - name: Upload Pages artifact
        if: steps.site.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.site.outputs.dir }}

  deploy:
    needs: build
    if: github.ref_type == 'tag' || github.ref_name == 'main' || github.repository != 'DiamondLightSource/myst-version-switcher-plugin'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write       # deploy to Pages
      id-token: write    # deploy-pages OIDC
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
