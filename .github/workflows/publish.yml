name: Publish

# Reconstruct the WHOLE versioned docs site from durable sources (main's build,
# release docs.zip assets, open-PR build artifacts) and deploy it directly to
# GitHub Pages — no gh-pages branch. This is the PRIVILEGED half, deliberately
# split from CI so fork PR builds (which run in CI, unprivileged) can never deploy.
#
# It runs in the trusted upstream context off the DEFAULT BRANCH (both triggers
# do), so the github-pages environment only ever needs to allow the default branch
# — tags and PRs deploy through here, not from their own refs. See DESIGN.md.
on:
  # After every CI run. workflow_run only fires from the file on the default
  # branch and always runs off it, with a full token.
  workflow_run:
    workflows: [CI]
    types: [completed]
  # Maintainer opt-in to preview an external fork PR: pins its CURRENT head commit
  # as approved, then assembles. A new push to that PR drops it until re-approved.
  workflow_dispatch:
    inputs:
      pr:
        description: External fork PR number to approve (pins its head SHA) and preview.
        required: false

permissions:
  contents: read     # checkout + read release assets
  actions: read      # gh run download (cross-run docs artifacts)
  pages: write       # deploy to Pages
  id-token: write    # deploy-pages OIDC
  statuses: write    # set the preview-approved status on a fork PR head SHA

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    # 1) Only the canonical repo publishes (a fork running this file is inert).
    # 2) Then either the maintainer's manual fork opt-in, OR a SUCCESSFUL CI run
    #    whose build came from this repo (push to main/tag, or an INTERNAL PR) —
    #    an unapproved fork PR's build has head_repository == the fork, so it does
    #    not trigger a publish. See DESIGN "What stays in the caller workflow".
    if: >-
      github.repository == 'DiamondLightSource/myst-version-switcher-plugin' &&
      ( github.event_name == 'workflow_dispatch' ||
        ( github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_repository.full_name == github.repository ) )
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0     # tags, for version ordering + prerelease detection

      # Fork opt-in (dispatch only): pin THIS commit as approved. assemble gathers
      # an external PR only when its head SHA carries this status, so a later push
      # (new SHA) silently drops the preview until a maintainer re-approves.
      - name: Approve fork PR head SHA
        if: github.event_name == 'workflow_dispatch' && inputs.pr != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ inputs.pr }}
        run: |
          set -euo pipefail
          sha=$(gh pr view "$PR" --repo "$REPO" --json headRefOid -q .headRefOid)
          gh api --method POST "repos/$REPO/statuses/$sha" \
            -f state=success -f context=preview-approved \
            -f description="Fork docs preview approved"

      - name: Assemble versioned site
        id: site
        uses: ./assemble
        with:
          repo: ${{ github.repository }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.site.outputs.dir }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
