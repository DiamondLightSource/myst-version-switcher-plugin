name: Stage versioned docs + switcher.json
description: >-
  Move a built MyST HTML site into a versioned directory under the GitHub Pages
  root and (re)generate the pydata switcher.json from the deployed versions.
  Use after `myst build --html`, before the gh-pages publish step.

inputs:
  version:
    description: Sanitised ref/version name — the directory created under the Pages root.
    required: true
  repo:
    description: "org/repo, e.g. ${{ github.repository }} (used to build version URLs)."
    required: true
  pages_dir:
    description: Directory that gets published to gh-pages (the Pages root).
    required: false
    default: .github/pages
  html_dir:
    description: Built HTML directory to stage (the `myst build --html` output).
    required: false
    default: docs/_build/html

runs:
  using: composite
  steps:
    # Supply our own tag + gh-pages tree, so consumers need not set fetch-depth: 0.
    - name: Fetch tags and gh-pages for the version list
      shell: bash
      run: |
        git fetch --tags --depth=1 origin \
          '+refs/heads/gh-pages:refs/remotes/origin/gh-pages' \
          || echo "no gh-pages branch yet (first deploy)"

    - name: Stage the versioned build
      shell: bash
      run: |
        mkdir -p "${{ inputs.pages_dir }}"
        mv "${{ inputs.html_dir }}" "${{ inputs.pages_dir }}/${{ inputs.version }}"

    - name: Write switcher.json
      shell: bash
      run: |
        node "$GITHUB_ACTION_PATH/make-switcher.mjs" \
          --add "${{ inputs.version }}" \
          "${{ inputs.repo }}" \
          "${{ inputs.pages_dir }}/switcher.json"
