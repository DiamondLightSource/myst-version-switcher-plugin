name: Assemble versioned docs site
description: >-
  Reconstruct the whole versioned docs site from durable sources and output its
  directory for the CALLER to publish to GitHub Pages. Gathers the default
  branch's latest build, every release's docs.zip asset, and the build artifact of
  each open PR (internal, or an external fork PR whose head commit carries a
  `preview-approved` status); writes switcher.json + a root redirect; and creates
  the `stable/` alias. Does NOT publish (deploy-pages is job-scoped — the caller
  owns it). Run from the trusted upstream context. Requires Node + `gh` on PATH
  (preinstalled on GitHub runners) and the repo checked out with tags
  (fetch-depth: 0).

inputs:
  repo:
    description: org/repo slug, for version URLs and gh lookups.
    required: false
    default: ${{ github.repository }}
  guard-default-branch:
    description: >-
      When 'true' (default), hard-fail the assemble if the repo's default branch
      is NOT in the site — guarding against publishing a hole when its latest
      build artifact has expired. Set 'false' only for throwaway previews.
    required: false
    default: "true"
  token:
    description: Token for gh (release assets + cross-run artifacts + statuses).
    required: false
    default: ${{ github.token }}

outputs:
  dir:
    description: Path to the assembled publish root, for upload-pages-artifact.
    value: ${{ steps.out.outputs.dir }}

runs:
  using: composite
  steps:
    # Gather (main + releases + approved open-PR artifacts) → generate switcher +
    # redirect → stable alias → output the site dir. The logic lives in
    # assemble.sh (runnable standalone for local testing) + assemble.mjs beside it.
    - name: Assemble
      id: out
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        REPO: ${{ inputs.repo }}
        GUARD_DEFAULT_BRANCH: ${{ inputs.guard-default-branch }}
      run: bash "$GITHUB_ACTION_PATH/assemble.sh"
