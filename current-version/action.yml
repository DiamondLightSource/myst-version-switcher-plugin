name: Current docs version
description: >-
  Sanitise the raw git ref into the version token used as BOTH the build-time
  BASE_URL sub-path and the site/<version> directory written by `assemble`, so
  the two can never drift. Run this BEFORE `myst build`. Shares the single
  sanitize() implementation in the sibling assemble.mjs (the whole repo is checked
  out with the action), so there is no bash-vs-JS rule to keep in sync. Requires
  Node on PATH.

inputs:
  ref-name:
    description: The raw, unsanitised ref (e.g. ${{ github.ref_name }}).
    required: true

outputs:
  version:
    description: The sanitised version token (BASE_URL sub-path + site dir name).
    value: ${{ steps.sanitize.outputs.version }}

runs:
  using: composite
  steps:
    - id: sanitize
      shell: bash
      # ref-name is passed via env (never interpolated into the script) so an
      # exotic ref can't inject shell.
      env:
        REF_NAME: ${{ inputs.ref-name }}
      run: |
        version=$(node "$GITHUB_ACTION_PATH/../assemble/assemble.mjs" sanitize "$REF_NAME")
        echo "version=$version" >> "$GITHUB_OUTPUT"
